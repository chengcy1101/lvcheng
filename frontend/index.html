<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绿城AI案场销助</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-building"></i>
                <span>绿城AI案场销助</span>
            </div>
            <div class="nav">
                <button class="nav-btn active" data-section="chat">
                    <i class="fas fa-comment-dots"></i>
                    <span>AI对话</span>
                </button>
                <button class="nav-btn" data-section="houses">
                    <i class="fas fa-home"></i>
                    <span>房源推荐</span>
                </button>
                <button class="nav-btn" data-section="calculator">
                    <i class="fas fa-calculator"></i>
                    <span>贷款计算</span>
                </button>
                <button class="nav-btn" data-section="records">
                    <i class="fas fa-history"></i>
                    <span>我的记录</span>
                </button>
            </div>
        </header>

        <!-- 房源详情模态框 -->
    <div id="houseDetailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">房源详情</h2>
                <button id="closeModal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 房源详情内容将通过JS动态生成 -->
            </div>
        </div>
    </div>

    <!-- 图片放大模态框 -->
    <div id="imageModal" class="modal image-modal">
        <span class="image-modal-close">&times;</span>
        <img class="image-modal-content" id="enlargedImage" alt="放大的图片">
        <div id="imageCaption"></div>
    </div>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- AI对话区 -->
            <section id="chat" class="section active">
                <div class="chat-container">
                    <div class="chat-header">
                        <h2>AI智能接待</h2>
                        <div class="status">
                            <span class="status-dot"></span>
                            <span>在线</span>
                        </div>
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        <div class="message ai-message">
                            <div class="message-avatar">
                                <i class="fas fa-robot"></i>
                            </div>
                            <div class="message-content">
                                <p>您好！欢迎来到绿城案场，我是您的AI销助顾问。请问有什么可以帮到您的？</p>
                            </div>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="userInput" placeholder="请输入您的问题...">
                        <button id="sendBtn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>

                <!-- 核心能力区 -->
                <div class="core-abilities">
                    <h3>核心能力</h3>
                    <div class="abilities-grid">
                        <div class="ability-card" data-intent="house">
                            <i class="fas fa-home"></i>
                            <span>了解户型</span>
                        </div>
                        <div class="ability-card" data-intent="price">
                            <i class="fas fa-tag"></i>
                            <span>询价预算</span>
                        </div>
                        <div class="ability-card" data-intent="loan">
                            <i class="fas fa-money-bill-wave"></i>
                            <span>贷款咨询</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 房源推荐区 -->
            <section id="houses" class="section">
                <div class="section-header">
                    <h2>推荐房源</h2>
                </div>
                <div class="houses-grid" id="housesGrid">
                    <!-- 房源卡片将通过JS动态生成 -->
                </div>
            </section>

            <!-- 贷款计算器区 -->
            <section id="calculator" class="section">
                <div class="section-header">
                    <h2>贷款计算器</h2>
                </div>
                <div class="calculator-container">
                    <div class="calculator-form">
                        <div class="form-group">
                            <label for="housePrice">房价（万元）</label>
                            <input type="number" id="housePrice" value="300" min="100" max="1000">
                        </div>
                        <div class="form-group">
                            <label for="downPayment">首付比例（%）</label>
                            <input type="number" id="downPayment" value="30" min="20" max="80">
                        </div>
                        <div class="form-group">
                            <label for="loanTerm">贷款年限</label>
                            <select id="loanTerm">
                                <option value="10">10年</option>
                                <option value="20">20年</option>
                                <option value="30" selected>30年</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="loanType">贷款类型</label>
                            <select id="loanType">
                                <option value="commercial">商业贷款</option>
                                <option value="fund">公积金贷款</option>
                                <option value="combination">组合贷款</option>
                            </select>
                        </div>
                        <button id="calculateBtn">计算月供</button>
                    </div>
                    <div class="calculator-result" id="calculatorResult">
                        <h3>计算结果</h3>
                        <div class="result-item">
                            <span>贷款金额：</span>
                            <span id="loanAmount">210万元</span>
                        </div>
                        <div class="result-item">
                            <span>月供：</span>
                            <span id="monthlyPayment">11,041元</span>
                        </div>
                        <div class="result-item">
                            <span>总利息：</span>
                            <span id="totalInterest">187.48万元</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 我的记录区 -->
            <section id="records" class="section">
                <div class="section-header">
                    <h2>我的咨询记录</h2>
                </div>
                <div class="records-list" id="recordsList">
                    <!-- 记录将通过JS动态生成 -->
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
